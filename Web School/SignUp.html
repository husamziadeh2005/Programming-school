<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Lets Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark">

    <div class="container py-5">
        <div class="auth-container">
            <div class="text-center mb-4">
                <a href="index.html">
                    <img src="assets/images/lg.png" alt="Logo" class="rounded-circle mb-3" width="80">
                </a>
                <h1 class="mb-1">Create Account</h1>
                <p class="text-muted">Start your coding journey with us today</p>
            </div>

            <form id="signupForm" action="index.html">
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                        <input type="email" class="form-control bg-light border-start-0 ps-0" id="email" placeholder="name@example.com" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" class="form-control bg-light border-start-0 ps-0" id="password" placeholder="Create a password" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold d-block">Gender</label>
                    <div class="d-flex gap-4 mt-2">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender" id="male" required>
                            <label class="form-check-label" for="male">Male</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender" id="female" required>
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="birthdate" class="form-label fw-bold">Birth Date</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-calendar text-muted"></i></span>
                        <input type="date" class="form-control bg-light border-start-0 ps-0" id="birthdate" required>
                    </div>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label small" for="terms">I agree to the <a href="terms.html" class="text-decoration-none">Terms and Conditions</a></label>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 py-2 mb-3">Sign Up</button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0 text-muted">Already have an account? <a href="login.html" class="fw-bold text-decoration-none">Log in</a></p>
            </div>
            
            <div class="mt-4 pt-3 border-top text-center">
                <a href="index.html" class="text-muted text-decoration-none small"><i class="fas fa-arrow-left me-1"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
