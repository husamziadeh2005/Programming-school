<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lets Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark">

    <div class="container">
        <div class="auth-container">
            <div class="text-center mb-4">
                <a href="index.html">
                    <img src="assets/images/lg.png" alt="Logo" class="rounded-circle mb-3" width="80">
                </a>
                <h1 class="mb-1">Welcome Back</h1>
                <p class="text-muted">Log in to continue your learning journey</p>
            </div>

            <form id="loginForm" action="index.html">
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold">Username or Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" class="form-control bg-light border-start-0 ps-0" id="username" placeholder="Enter your username" required>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label fw-bold">Password</label>
                        <a href="#" class="small text-decoration-none">Forgot Password?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" class="form-control bg-light border-start-0 ps-0" id="password" placeholder="Enter your password" required>
                    </div>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label small" for="rememberMe">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 py-2 mb-3">Login</button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0 text-muted">Not a member? <a href="signup.html" class="fw-bold text-decoration-none">Sign up now</a></p>
            </div>
            
            <div class="mt-4 pt-3 border-top text-center">
                <a href="index.html" class="text-muted text-decoration-none small"><i class="fas fa-arrow-left me-1"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            // Here you would normally handle the login logic
            // For now, it just redirects to index.html as per original design
        });
    </script>
</body>
</html>
